version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vdcd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vdcd_db}
      POSTGRES_USER: ${DB_USER:-vdcd_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpass}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/vdcd_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-vdcd_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      target: deps
    container_name: vdcd-backend-dev
    restart: unless-stopped
    env_file: .env.development
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: pnpm start:dev

volumes:
  pgdata: